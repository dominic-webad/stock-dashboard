<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票分红监测仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117;--card:#1a1d2e;--card-hover:#222640;--border:#2a2e45;
    --text:#e4e6f0;--text2:#8b8fa3;--accent:#6c5ce7;
    --green:#00b894;--red:#e74c3c;--orange:#fdcb6e;--blue:#74b9ff;--pink:#fd79a8;
    --up:#e74c3c;--down:#00b894; /* A股习惯：红涨绿跌 */
    --radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .header{padding:28px 32px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header .right{display:flex;align-items:center;gap:12px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .meta{color:var(--text2);font-size:13px}

  .tabs{display:flex;gap:4px;padding:0 32px;border-bottom:1px solid var(--border)}
  .tab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;transition:.2s;user-select:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:20px 32px}
  .scard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
  .scard .label{font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .scard .value{font-size:22px;font-weight:700}
  .scard .sub{font-size:12px;color:var(--text2);margin-top:4px}

  .table-wrap{padding:0 32px 32px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:#15182a;color:var(--text2);font-weight:600;text-align:left;padding:10px 12px;position:sticky;top:0;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
  thead th:hover{color:var(--text)}
  thead th .sort-arrow{font-size:10px;margin-left:4px;opacity:.5}
  thead th.sorted .sort-arrow{opacity:1;color:var(--accent)}
  tbody tr{border-bottom:1px solid var(--border);transition:.15s}
  tbody tr:hover{background:var(--card-hover)}
  tbody td{padding:10px 12px;white-space:nowrap}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pos{color:var(--up)}.neg{color:var(--down)}
  .stock-name{font-weight:600;color:var(--text)}

  /* Summary row */
  tfoot td{background:#15182a;font-weight:700;padding:10px 12px;border-top:2px solid var(--accent);white-space:nowrap}
  tfoot td.num{text-align:right;font-variant-numeric:tabular-nums}

  .price-live{font-weight:600}
  .price-up{color:var(--up)}.price-down{color:var(--down)}.price-flat{color:var(--text2)}

  /* Margin module */
  .margin-section{padding:0 32px 32px}
  .margin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px}
  .margin-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .margin-card h3{font-size:14px;color:var(--text2);margin-bottom:14px;font-weight:500;display:flex;align-items:center;gap:8px}
  .margin-card h3 .icon{font-size:18px}
  .margin-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .margin-row:last-child{border-bottom:none}
  .margin-row .ml{color:var(--text2)}
  .margin-row .mr{font-weight:600;font-variant-numeric:tabular-nums}
  .leverage-bar{height:8px;border-radius:4px;background:#2a2e45;margin-top:12px;overflow:hidden}
  .risk-low{background:var(--green)}.risk-mid{background:var(--orange)}.risk-high{background:var(--red)}

  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 32px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .chart-card h3{font-size:14px;color:var(--text2);margin-bottom:14px;font-weight:500}
  .chart-card canvas{max-height:280px}

  td[contenteditable]{outline:none;border-radius:4px}
  td[contenteditable]:focus{background:#2a2e50;box-shadow:0 0 0 2px var(--accent)}
  td[contenteditable]:hover{background:#1e2238}

  @media(max-width:900px){
    .charts,.margin-grid{grid-template-columns:1fr}
    .header,.tabs,.summary,.table-wrap,.charts,.margin-section{padding-left:16px;padding-right:16px}
  }

  .tab-content{display:none}.tab-content.active{display:block}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:.2s}
  .btn:hover{filter:brightness(1.15)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-outline:hover{border-color:var(--accent);color:var(--text)}
  .toolbar{display:flex;gap:8px;align-items:center}
  .input-sm{background:#15182a;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;width:100px}
  .input-sm:focus{border-color:var(--accent);outline:none}

  .section-title{font-size:15px;font-weight:600;color:var(--text);padding:20px 32px 8px;display:flex;align-items:center;gap:8px}
  .section-divider{border:none;border-top:1px solid var(--border);margin:0 32px}
</style>
</head>
<body>

<div class="header">
  <h1>📊 股票分红监测仪表盘</h1>
  <div class="right">
    <div class="toolbar">
      <span class="live-dot" id="liveDot"></span>
      <span class="meta" id="priceStatus">行情加载中...</span>
      <span class="meta" id="updateTime"></span>
    </div>
    <button class="btn" onclick="refreshPrices()">🔄 刷新行情</button>
    <button class="btn btn-outline" onclick="exportData()">📥 导出</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="portfolio">持仓 & 杠杆</div>
  <div class="tab" data-tab="received">已收到分红</div>
  <div class="tab" data-tab="expected">预计分红</div>
  <div class="tab" data-tab="monitor">股息率监测</div>
  <div class="tab" data-tab="charts">图表分析</div>
</div>

<!-- ========== 持仓 & 杠杆 ========== -->
<div class="tab-content active" id="tab-portfolio">
  <div class="summary" id="summary-portfolio"></div>
  <div class="table-wrap">
    <table id="table-portfolio">
      <thead><tr id="thead-portfolio"></tr></thead>
      <tbody id="tbody-portfolio"></tbody>
      <tfoot id="tfoot-portfolio"></tfoot>
    </table>
  </div>
  <hr class="section-divider">
  <div class="section-title">🏦 融资杠杆详情</div>
  <div class="summary" id="summary-margin"></div>
  <div class="margin-section">
    <div class="margin-grid" id="margin-cards"></div>
    <div class="margin-card" style="margin-bottom:16px">
      <h3><span class="icon">⚙️</span> 融资参数</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">
        <div>
          <div class="margin-row"><span class="ml">场内融资利率</span><input class="input-sm" id="rateMargin" type="number" step="0.1" value="5.0" onchange="recalcMargin()">%</div>
          <div class="margin-row"><span class="ml">场外贷款利率</span><input class="input-sm" id="rateOutside" type="number" step="0.1" value="4.5" onchange="recalcMargin()">%</div>
        </div>
        <div>
          <div class="margin-row"><span class="ml">维持担保比例预警线</span><input class="input-sm" id="warnLine" type="number" step="5" value="150" onchange="recalcMargin()">%</div>
          <div class="margin-row"><span class="ml">平仓线</span><input class="input-sm" id="liquidLine" type="number" step="5" value="130" onchange="recalcMargin()">%</div>
        </div>
      </div>
    </div>
    <div class="table-wrap">
      <table id="table-margin-detail">
        <thead><tr><th>股票</th><th>市场</th><th>实时价</th><th>持股</th><th>市值</th><th>仓位</th><th>分摊负债</th><th>分摊净值</th><th>个股杠杆</th></tr></thead>
        <tbody id="tbody-margin-detail"></tbody>
        <tfoot id="tfoot-margin-detail"></tfoot>
      </table>
    </div>
  </div>
</div>

<!-- ========== 已收到分红 ========== -->
<div class="tab-content" id="tab-received">
  <div class="summary" id="summary-received"></div>
  <div class="table-wrap">
    <table id="table-received">
      <thead><tr id="thead-received"></tr></thead>
      <tbody id="tbody-received"></tbody>
      <tfoot id="tfoot-received"></tfoot>
    </table>
  </div>
</div>

<!-- ========== 预计分红 ========== -->
<div class="tab-content" id="tab-expected">
  <div class="summary" id="summary-expected"></div>
  <div class="table-wrap">
    <table id="table-expected">
      <thead><tr id="thead-expected"></tr></thead>
      <tbody id="tbody-expected"></tbody>
      <tfoot id="tfoot-expected"></tfoot>
    </table>
  </div>
</div>

<!-- ========== 股息率监测 ========== -->
<div class="tab-content" id="tab-monitor">

      <tfoot id="tfoot-ah"></tfoot>

      <tfoot id="tfoot-monitor"></tfoot>
    </table>
  </div>
</div>

<!-- ========== 图表 ========== -->

</div>

// ==================== HELPERS ====================
const fmt=(v,d=2)=>v==null?'-':typeof v==='string'?v:Number(v).toFixed(d);
const fmtPct=v=>v==null?'-':(v*100).toFixed(2)+'%';
const fmtMoney=v=>{if(v==null)return'-';if(Math.abs(v)>=10000)return(v/10000).toFixed(2)+'万';return v.toLocaleString('zh-CN')};
const fmtMoneyFull=v=>v==null?'-':'¥'+Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const pctClass=v=>v>0?'pos':v<0?'neg':'';
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Live prices
let livePrices={a:{},hk:{}};
function getLivePrice(ticker){if(!ticker)return null;const isHK=ticker.startsWith('hk');return(isHK?livePrices.hk:livePrices.a)[ticker]||null}
function priceClass(ticker){const l=getLivePrice(ticker);if(!l)return'';return l.change>0?'price-up':l.change<0?'price-down':'price-flat'}

// 用实时价格重算股息率
function calcLiveYield(d){
  const l=getLivePrice(d.ticker);if(!l||!l.price)return d.yield||0;
  let dpd=d.perDiv||d.div||0;
  if(typeof dpd==='string')dpd=parseFloat(dpd.replace(/[^\d.]/g,''))||0;
  return dpd>0?dpd/l.price:0;
}

async function fetchPrices(){
  try{
    document.getElementById('priceStatus').textContent='正在获取行情...';
    const r=await fetch(API_URL);if(!r.ok)throw new Error();
    const d=await r.json();livePrices=d;
    document.getElementById('priceStatus').textContent='行情已更新 '+new Date(d.ts).toLocaleTimeString('zh-CN');
    document.getElementById('liveDot').style.background='var(--green)';return true;
  }catch(e){
    document.getElementById('priceStatus').textContent='行情获取失败(需启动server.js)';
    document.getElementById('liveDot').style.background='var(--red)';return false;
  }
}

  const warn=parseFloat(document.getElementById('warnLine')?.value)||150;

    const l=getLivePrice(d.ticker);const mv=l?l.price*d.shares:d.curCost;
    totalMV+=mv;
    if(d.ticker.startsWith('hk'))hkShareMV+=mv; else aShareMV+=mv;

    <div class="margin-card">
      <h3><span class="icon">📈</span> 利息与分红</h3>
      <div class="margin-row"><span class="ml">场内年利息 (${rateM}%)</span><span class="mr neg">${fmtMoneyFull(intM)}</span></div>
      <div class="margin-row"><span class="ml">场外年利息 (${rateO}%)</span><span class="mr neg">${fmtMoneyFull(intO)}</span></div>
      <div class="margin-row"><span class="ml">年利息合计</span><span class="mr neg">${fmtMoneyFull(totalInt)}</span></div>
      <div class="margin-row"><span class="ml">年分红收入 (全部)</span><span class="mr pos">${fmtMoneyFull(totalDiv)}</span></div>
      <div class="margin-row"><span class="ml">净分红</span><span class="mr ${pctClass(netDiv)}">${fmtMoneyFull(netDiv)}</span></div>
    </div>`;

  // Per-stock detail — 只按 A 股分摊负债
  let sumMV=0,sumDebtAlloc=0,sumEqAlloc=0;
  const rows=receivedData.map(d=>{
    const isHK=d.ticker.startsWith('hk');
    const l=getLivePrice(d.ticker);const p=l?l.price:null;
    const mv=p?p*d.shares:d.curCost;
    // 权重按 A 股担保资产计算，港股不分摊负债
    const w=isHK?0:(aShareMV>0?mv/aShareMV:0);
    const debtA=isHK?0:totalDebt*w;
    const eqA=isHK?mv:(mv-debtA); // 港股净资产=市值（无负债）
    const lev=isHK?1:(eqA>0?mv/eqA:Infinity);
    sumMV+=mv;sumDebtAlloc+=debtA;sumEqAlloc+=eqA;
    const marketTag=isHK?'<span style="color:var(--blue);font-size:11px">🇭🇰 港股</span>':'<span style="color:var(--orange);font-size:11px">🇨🇳 A股</span>';
    return`<tr><td class="stock-name">${d.name}</td><td>${marketTag}</td><td class="num">${p?'¥'+fmt(p):'-'}</td><td class="num">${d.shares}</td><td class="num">${fmtMoney(mv)}</td><td class="num">${isHK?'—':fmtPct(w)}</td><td class="num">${isHK?'—':fmtMoney(debtA)}</td><td class="num ${pctClass(eqA)}">${fmtMoney(eqA)}</td><td class="num">${isHK?'1.00x':fmt(lev,2)+'x'}</td></tr>`;
  }).join('');
  document.getElementById('tbody-margin-detail').innerHTML=rows;
  document.getElementById('tfoot-margin-detail').innerHTML=`<tr>
    <td class="stock-name">汇总</td><td></td><td></td><td></td>
    <td class="num">${fmtMoney(sumMV)}</td><td></td>
    <td class="num">${fmtMoney(sumDebtAlloc)}</td>
    <td class="num ${pctClass(sumEqAlloc)}">${fmtMoney(sumEqAlloc)}</td>
    <td class="num">${sumEqAlloc>0?fmt(sumMV/sumEqAlloc,2)+'x':'∞'}</td>
  </tr>`;
}

// ==================== MONITOR ====================
function renderMonitor(){
  const data=monitorData;
  const avgYield=data.reduce((s,d)=>s+(d.yield||0),0)/data.length;
  const topYield=[...data].sort((a,b)=>(b.yield||0)-(a.yield||0))[0];
  const lowestPE=[...data].filter(d=>d.pe).sort((a,b)=>a.pe-b.pe)[0];

  document.getElementById('summary-monitor').innerHTML=`
    <div class="scard"><div class="label">监测股票</div><div class="value">${data.length}</div><div class="sub">只</div></div>
    <div class="scard"><div class="label">平均股息率</div><div class="value">${fmtPct(avgYield)}</div></div>
    <div class="scard"><div class="label">最高股息率</div><div class="value pos">${fmtPct(topYield?.yield)}</div><div class="sub">${topYield?.name}</div></div>
    <div class="scard"><div class="label">最低PE</div><div class="value">${fmt(lowestPE?.pe)}</div><div class="sub">${lowestPE?.name}</div></div>`;

  // A/H table
  const ahPairs=[
    {base:'工商银行',a:'工商银行(A)',h:'工商银行(H)',aTicker:'sh601398',hTicker:'hk01398'},
    {base:'农业银行',a:'农业银行(A)',h:'农业银行(H)',aTicker:'sh601288',hTicker:'hk01288'},
    {base:'中国银行',a:'中国银行(A)',h:'中国银行(H)',aTicker:'sh601988',hTicker:'hk03988'},
    {base:'建设银行',a:'建设银行(A)',h:'建设银行(H)',aTicker:'sh601939',hTicker:'hk00939'},
    {base:'交通银行',a:'交通银行(A)',h:'交通银行(H)',aTicker:'sh601328',hTicker:'hk03328'},
    {base:'招商银行',a:'招商银行(A)',h:'招商银行(H)',aTicker:'sh600036',hTicker:'hk03968'},
    {base:'中国移动',a:'中国移动',h:'中国移动(H)',aTicker:'sh600941',hTicker:'hk00941'}
  ];
  const byName=Object.fromEntries(data.map(d=>[d.name,d]));

  let ahRows='';
  ahPairs.forEach(pair=>{
    const a=byName[pair.a],h=byName[pair.h];if(!a||!h)return;
    const aL=getLivePrice(a.ticker),hL=getLivePrice(h.ticker);
    const aP=aL?aL.price:a.price,hP=hL?hL.price:h.price;
    const aC=aL?aL.changePct:0,hC=hL?hL.changePct:0;
    const prem=aP&&hP?(aP/hP-1):0;
    ahRows+=`<tr>
      <td class="stock-name">${pair.base}</td>
      <td class="num" style="color:var(--text2)">${pair.aTicker}</td>
      <td class="num price-live ${aC>0?'price-up':aC<0?'price-down':''}">¥${fmt(aP)}</td>
      <td class="num ${pctClass(aC)}">${aC>0?'+':''}${fmt(aC)}%</td>
      <td class="num" style="color:var(--text2)">${pair.hTicker}</td>
      <td class="num price-live ${hC>0?'price-up':hC<0?'price-down':''}">HK$${fmt(hP)}</td>
      <td class="num ${pctClass(hC)}">${hC>0?'+':''}${fmt(hC)}%</td>
      <td class="num ${prem>0?'neg':'pos'}">${prem>0?'+':''}${fmtPct(prem)}</td>
      <td class="num">${fmtPct(a.yield)}</td><td class="num">${fmtPct(h.yield)}</td>
      <td class="num">${fmt(a.pe)}</td><td class="num">${fmt(a.pb)}</td><td class="num">${fmtPct(a.roe)}</td>
    </tr>`;
  });
  document.getElementById('tbody-ah').innerHTML=ahRows;
  // A/H summary
  const avgPrem=ahPairs.reduce((s,p)=>{
    const a=byName[p.a],h=byName[p.h];if(!a||!h)return s;
    const aL=getLivePrice(a.ticker),hL=getLivePrice(h.ticker);
    const aP=aL?aL.price:a.price,hP=hL?hL.price:h.price;
    return s+(aP&&hP?(aP/hP-1):0);
  },0)/ahPairs.length;
  document.getElementById('tfoot-ah').innerHTML=`<tr><td class="stock-name">平均</td><td></td><td></td><td></td><td></td><td></td><td></td>
    <td class="num ${avgPrem>0?'neg':'pos'}">${avgPrem>0?'+':''}${fmtPct(avgPrem)}</td><td></td><td></td><td></td><td></td><td></td></tr>`;

  // Monitor table
  const mRows=data.map(d=>{
    const l=getLivePrice(d.ticker);const p=l?l.price:d.price;const c=l?l.changePct:0;
    return`<tr><td class="stock-name">${d.name}</td>
      <td class="num price-live ${c>0?'price-up':c<0?'price-down':''}">${fmt(p)}</td>
      <td class="num ${pctClass(c)}">${c>0?'+':''}${fmt(c)}%</td>
      <td class="num">${d.div?fmt(d.div,4):'-'}</td>
      <td class="num ${pctClass(d.yield)}">${fmtPct(d.yield)}</td>
      <td class="num">${d.hk?'HK$'+fmt(d.hk):'-'}</td>
      <td class="num">${fmt(d.nav)}</td><td class="num">${fmt(d.eps)}</td>
      <td class="num">${fmt(d.pe)}</td><td class="num">${fmt(d.pb)}</td>
      <td class="num">${fmtPct(d.roe)}</td><td class="num">${fmt(d.invPe,4)}</td></tr>`;
  }).join('');
  document.getElementById('tbody-monitor').innerHTML=mRows;
  // Monitor summary
  const mSum=data.reduce((s,d)=>{s.yield+=(d.yield||0);s.roe+=(d.roe||0);s.count++;return s},{yield:0,roe:0,count:0});
  document.getElementById('tfoot-monitor').innerHTML=`<tr>
    <td class="stock-name">平均 (${mSum.count}只)</td><td></td><td></td><td></td>
    <td class="num">${fmtPct(mSum.yield/mSum.count)}</td><td></td><td></td><td></td>
    <td></td><td></td><td class="num">${fmtPct(mSum.roe/mSum.count)}</td><td></td></tr>`;
}

// ==================== CHARTS ====================
let charts={};
function renderCharts(){
  Object.values(charts).forEach(c=>c.destroy());charts={};
  const names=receivedData.map(d=>d.name);
  const colors=['#6c5ce7','#00b894','#fdcb6e','#e74c3c','#74b9ff','#fd79a8','#a29bfe','#55efc4'];

  charts.pie=new Chart(document.getElementById('chart-pie'),{
    type:'doughnut',
    data:{labels:names,datasets:[{data:receivedData.map(d=>{const l=getLivePrice(d.ticker);return l?l.price*d.shares:d.curCost}),backgroundColor:colors,borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'#8b8fa3',font:{size:12}}}}}
  });
  charts.dividend=new Chart(document.getElementById('chart-dividend'),{
    type:'bar',
    data:{labels:names,datasets:[
      {label:'已收股息率',data:receivedData.map(d=>(d.yield||0)*100),backgroundColor:'#6c5ce7',borderRadius:6},
      {label:'预计股息率',data:expectedData.map(d=>(d.yield||0)*100),backgroundColor:'#00b894',borderRadius:6}
    ]},
    options:{responsive:true,scales:{y:{ticks:{color:'#8b8fa3',callback:v=>v+'%'},grid:{color:'#2a2e45'}},x:{ticks:{color:'#8b8fa3'},grid:{display:false}}},plugins:{legend:{labels:{color:'#8b8fa3'}}}}
  });
  const scatterData=monitorData.filter(d=>d.roe&&d.pe).map(d=>({x:d.roe*100,y:d.pe,name:d.name}));
  charts.scatter=new Chart(document.getElementById('chart-scatter'),{
    type:'scatter',
    data:{datasets:[{label:'股票',data:scatterData,backgroundColor:colors.concat(colors).slice(0,scatterData.length),pointRadius:8,pointHoverRadius:10}]},
    options:{responsive:true,scales:{x:{title:{display:true,text:'ROE (%)',color:'#8b8fa3'},ticks:{color:'#8b8fa3'},grid:{color:'#2a2e45'}},y:{title:{display:true,text:'PE',color:'#8b8fa3'},ticks:{color:'#8b8fa3'},grid:{color:'#2a2e45'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${scatterData[ctx.dataIndex].name}: ROE=${ctx.parsed.x.toFixed(1)}%, PE=${ctx.parsed.y.toFixed(1)}`}}}}
  });
  charts.bar=new Chart(document.getElementById('chart-bar'),{
    type:'bar',
    data:{labels:names,datasets:[
      {label:'已收分红',data:receivedData.map(d=>d.dividend),backgroundColor:'#74b9ff',borderRadius:6},
      {label:'预计分红',data:expectedData.map(d=>d.dividend),backgroundColor:'#fd79a8',borderRadius:6}
    ]},
    options:{responsive:true,scales:{y:{ticks:{color:'#8b8fa3',callback:v=>(v/10000).toFixed(1)+'万'},grid:{color:'#2a2e45'}},x:{ticks:{color:'#8b8fa3'},grid:{display:false}}},plugins:{legend:{labels:{color:'#8b8fa3'}}}}
  });
}

// ==================== EXPORT ====================
function exportData(){
  let csv='\uFEFF项目,实时价格,涨跌幅,已收分红,预计分红,股息率,买入成本,持仓成本,EPS2025,EPS增速,ROE,PE,PB\n';
  receivedData.forEach((d,i)=>{const e=expectedData[i];const l=getLivePrice(d.ticker);const p=l?l.price:'';const c=l?l.changePct:'';
    csv+=`${d.name},${p},${c},${d.dividend},${e.dividend},${fmtPct(d.yield)},${d.cost},${d.holdCost},${d.eps25},${fmtPct(d.epsGrowth)},${fmtPct(d.roe)},${d.pe},${d.pb}\n`});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='stocks_export.csv';a.click();showToast('已导出CSV');
}

// ==================== RENDER ALL ====================
function renderAll(){renderPortfolio();renderPortfolioTable(receivedData,'received');renderPortfolioTable(expectedData,'expected');renderMargin();renderMonitor()}

// ==================== INIT ====================
document.getElementById('updateTime').textContent=new Date().toLocaleDateString('zh-CN');
renderAll();
fetchPrices().then(ok=>{if(ok)renderAll()});
setInterval(()=>{fetchPrices().then(ok=>{if(ok)renderAll()})},30000);
</script>
